<div id="standings" class="content">
  <h2>Standings</h2>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">💰 Total Pot</div>
      <div id="potTotal" class="stat-value">$0</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Players Remaining</div>
      <div id="remainingCount" class="stat-value">0</div>
    </div>
  </div>

  <div class="scoreboard-panel">
    <div class="scoreboard-header">
      <h3 class="scoreboard-title">Tournament Tracker</h3>
      <p class="scoreboard-subtitle">Daily picks, results, and eliminations</p>
    </div>

    <div class="table-wrapper">
      <table id="standingsTable">
        <thead>
          <tr>
            <th></th>
          </tr>
          <tr>
            <th>Name</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>
