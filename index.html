<!DOCTYPE html>
<html>
<head>
  <title>March Madness Survivor Pool</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    .tabs {
      display: flex;
      background: #134611;
    }

    .tab {
      padding: 15px;
      color: white;
      cursor: pointer;
      flex: 1;
      text-align: center;
    }

    .tab.active {
      background: #1f7a1f;
      font-weight: bold;
    }

    .content {
      padding: 20px;
      display: none;
    }

    .content.active {
      display: block;
    }

    button {
      padding: 10px 15px;
      background: #134611;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    .admin {
      margin-top: 40px;
      padding: 15px;
      border: 2px dashed #aaa;
    }
  </style>
</head>
<body>

<div class="tabs">
  <div class="tab active" onclick="switchTab('standings')">Standings</div>
  <div class="tab" onclick="switchTab('pick')">Make a Pick</div>
</div>

<div id="standings" class="content active">
  <h2>Standings</h2>
  <table id="standingsTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>Status</th>
        <th>Current Pick</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div id="pick" class="content">
  <h2>Submit Your Pick</h2>

  <input type="text" id="playerName" placeholder="Your Name">
  <br><br>

  <select id="teamSelect"></select>
  <br>

  <button onclick="submitPick()">Submit Pick</button>

  <p id="message"></p>

  <!-- ADMIN PANEL STARTS HERE -->
  <div class="admin">
    <h3>Admin Controls</h3>

    <label>
      <input type="checkbox" id="lockToggle" onchange="toggleLock()">
      Lock Picks
    </label>

    <br><br>

    <label>Set Lock Time:</label>
    <input type="datetime-local" id="lockTimeInput">
    <button onclick="setLockTime()">Update Lock Time</button>
  </div>
  <!-- ADMIN PANEL ENDS HERE -->

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, collection, getDocs, doc, setDoc, getDoc, updateDoc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAItF0tjggt3yRvuEPKaCo2cDGIx76-eaM",
  authDomain: "ncaa-tournament-survivor-pool.firebaseapp.com",
  projectId: "ncaa-tournament-survivor-pool",
  storageBucket: "ncaa-tournament-survivor-pool.firebasestorage.app",
  messagingSenderId: "870538967309",
  appId: "1:870538967309:web:89d2c0f88ea239eec19844"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* --------------------------
   TAB SWITCHING
-------------------------- */
window.switchTab = function(tab) {
  document.querySelectorAll(".content").forEach(c => c.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
  event.target.classList.add("active");
}

/* --------------------------
   LOAD TEAMS
-------------------------- */
async function loadTeams() {
  const snapshot = await getDocs(collection(db, "teams"));
  const select = document.getElementById("teamSelect");
  select.innerHTML = "";

  snapshot.forEach(docSnap => {
    const team = docSnap.data();
    if (!team.eliminated) {
      select.innerHTML += `<option value="${team.name}">${team.name}</option>`;
    }
  });
}

/* --------------------------
   LOAD STANDINGS
-------------------------- */
async function loadStandings() {
  const snapshot = await getDocs(collection(db, "players"));
  const tbody = document.querySelector("#standingsTable tbody");
  tbody.innerHTML = "";

  snapshot.forEach(docSnap => {
    const data = docSnap.data();
    tbody.innerHTML += `
      <tr>
        <td>${data.name}</td>
        <td>${data.status}</td>
        <td>${data.currentPick || ""}</td>
      </tr>
    `;
  });
}

/* --------------------------
   SUBMIT PICK
-------------------------- */
window.submitPick = async function() {

  const name = document.getElementById("playerName").value.trim();
  const team = document.getElementById("teamSelect").value;
  const message = document.getElementById("message");

  if (!name) {
    message.innerText = "Enter your name.";
    return;
  }

  const settingsSnap = await getDoc(doc(db, "settings", "global"));
  const settings = settingsSnap.data();

  // LOCK CHECK
  if (settings?.picksLocked) {
    message.innerText = "Picks are locked.";
    return;
  }

  // LOCK TIME CHECK
  if (settings?.lockTime) {
    const now = new Date();
    const lockTime = settings.lockTime.toDate();
    if (now >= lockTime) {
      message.innerText = "Picks are locked for today.";
      return;
    }
  }

  // DUPLICATE TEAM CHECK
  const playersSnap = await getDocs(collection(db, "players"));
  let duplicate = false;

  playersSnap.forEach(docSnap => {
    if (docSnap.data().currentPick === team) {
      duplicate = true;
    }
  });

  if (duplicate) {
    message.innerText = "That team has already been selected.";
    return;
  }

  // SAVE PICK
  await setDoc(doc(db, "players", name), {
    name: name,
    currentPick: team,
    status: "alive",
    pickHistory: [team]
  }, { merge: true });

  message.innerText = "Pick Submitted - Good Luck!";

  loadStandings();
};

/* --------------------------
   ADMIN FUNCTIONS
-------------------------- */
window.toggleLock = async function() {
  const lock = document.getElementById("lockToggle").checked;
  await updateDoc(doc(db, "settings", "global"), {
    picksLocked: lock
  });
  alert("Lock updated.");
};

window.setLockTime = async function() {
  const input = document.getElementById("lockTimeInput").value;
  const date = new Date(input);

  await updateDoc(doc(db, "settings", "global"), {
    lockTime: date
  });

  alert("Lock time updated.");
};

/* --------------------------
   INITIAL LOAD
-------------------------- */
loadStandings();
loadTeams();

</script>

</body>
</html>
