<!DOCTYPE html>
<html>
<head>
  <title>March Madness Survivor Pool</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    .tabs {
      display: flex;
      background: #134611;
    }

    .tab {
      padding: 15px;
      color: white;
      cursor: pointer;
      flex: 1;
      text-align: center;
    }

    .tab.active {
      background: #1f7a1f;
      font-weight: bold;
    }

    .content {
      padding: 20px;
      display: none;
    }

    .content.active {
      display: block;
    }

    button {
      padding: 10px 15px;
      background: #134611;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    .admin {
      margin-top: 40px;
      padding: 15px;
      border: 2px dashed #aaa;
    }
  </style>
</head>
<body>

<div class="tabs">
  <div class="tab active" onclick="switchTab('standings')">Standings</div>
  <div class="tab" onclick="switchTab('pick')">Make a Pick</div>
</div>

<div id="standings" class="content active">
  <h2>Standings</h2>
  <table id="standingsTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>Status</th>
        <th>Current Pick</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div id="pick" class="content">
  <h2>Submit Your Pick</h2>

  <input type="text" id="playerName" placeholder="Your Name">
  <br><br>

  <select id="teamSelect"></select>
  <br>

  <button onclick="submitPick()">Submit Pick</button>

  <p id="message"></p>
</div>

<script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyAItF0tjggt3yRvuEPKaCo2cDGIx76-eaM",
  authDomain: "ncaa-tournament-survivor-pool.firebaseapp.com",
  projectId: "ncaa-tournament-survivor-pool",
  storageBucket: "ncaa-tournament-survivor-pool.firebasestorage.app",
  messagingSenderId: "870538967309",
  appId: "1:870538967309:web:89d2c0f88ea239eec19844"
};

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.switchTab = function(tab) {
    document.querySelectorAll(".content").forEach(c => c.classList.remove("active"));
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById(tab).classList.add("active");
    event.target.classList.add("active");
  }

  async function loadStandings() {
    const snapshot = await getDocs(collection(db, "players"));
    const tbody = document.querySelector("#standingsTable tbody");
    tbody.innerHTML = "";

    snapshot.forEach(docSnap => {
      const data = docSnap.data();
      tbody.innerHTML += `
        <tr>
          <td>${data.name}</td>
          <td>${data.status}</td>
          <td>${data.currentPick || ""}</td>
        </tr>
      `;
    });
  }

  window.submitPick = async function() {

    const name = document.getElementById("playerName").value;
    const team = document.getElementById("teamSelect").value;

    const settingsSnap = await getDoc(doc(db, "settings", "global"));
    const settings = settingsSnap.data();

    if (settings?.picksLocked) {
      document.getElementById("message").innerText = "Picks are locked.";
      return;
    }

    await setDoc(doc(db, "players", name), {
      name: name,
      currentPick: team,
      status: "alive"
    }, { merge: true });

    document.getElementById("message").innerText = "Pick Submitted - Good Luck!";
    loadStandings();
  }

  loadStandings();

</script>

</body>
</html>
