<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>March Madness Survivor Pool</title>

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      background: linear-gradient(to bottom, #0b3d0b, #1f7a1f);
      color: white;
    }

    .admin-gear {
      position: absolute;
      top: 10px;
      right: 15px;
      cursor: pointer;
      font-size: 18px;
      z-index: 1000;
    }

    .tabs {
      display: flex;
      background: #0b3d0b;
      position: sticky;
      top: 0;
      z-index: 500;
    }

    .tab {
      flex: 1;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      color: white;
      font-weight: 600;
      background: transparent;
      border: none;
    }

    .tab:hover {
      background: #1f7a1f;
    }

    .tab.active {
      background: #2e8b2e;
      font-weight: 700;
    }

    .content {
      display: none;
      background: white;
      color: black;
      margin: 20px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
    }

    .content.active {
      display: block;
    }

    h2, h3 {
      margin-top: 0;
    }

    input, select, button {
      font: inherit;
    }

    input[type="text"],
    input[type="datetime-local"],
    select {
      padding: 10px;
      margin: 5px 0;
      border: 1px solid #bbb;
      border-radius: 6px;
      width: 260px;
      max-width: 100%;
      box-sizing: border-box;
    }

    button.action-button {
      padding: 10px 14px;
      background: #134611;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
      margin-right: 8px;
    }

    button.action-button:hover {
      background: #0f3810;
    }

    .admin {
      margin-top: 40px;
      padding: 15px;
      border: 2px dashed #aaa;
      border-radius: 8px;
      background: #f8f8f8;
    }

    .table-wrapper {
      overflow-x: auto;
      width: 100%;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: max-content;
      min-width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      background: white;
    }

    th,
    td {
      padding: 6px 10px;
      border: 1px solid #ccc;
      text-align: center;
      min-width: 120px;
      vertical-align: middle;
    }

    td:first-child,
    th:first-child {
      position: sticky;
      left: 0;
      background: white;
      z-index: 2;
      text-align: left;
      font-weight: bold;
      min-width: 180px;
    }

    thead tr:first-child th {
      background: #ffeb3b;
      font-weight: bold;
    }

    thead tr:nth-child(2) th {
      background: #ddd;
    }

    thead th:first-child {
      z-index: 3;
    }

    .winCell {
      background: #c8e6c9;
      color: #1b5e20;
      font-weight: bold;
    }

    .lossCell {
      background: #ffcdd2;
      color: #b71c1c;
      font-weight: bold;
    }

    .eliminatedCell {
      background: black !important;
      color: white !important;
    }

    .hiddenPickCell {
      color: #444;
      font-style: italic;
      font-weight: 600;
      background: #f3f3f3;
    }

    .pick-cell {
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: flex-start;
    }

    .pick-logo {
      width: 20px;
      height: 20px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .team-select-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .selected-team-logo-wrap {
      width: 42px;
      height: 42px;
      border: 1px solid #ccc;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
    }

    .selected-team-logo {
      width: 30px;
      height: 30px;
      object-fit: contain;
    }

    .team-preview-list {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 8px;
      max-width: 700px;
    }

    .team-preview-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f7f7f7;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 6px 8px;
      color: #222;
      font-size: 14px;
    }

    .team-preview-item img {
      width: 22px;
      height: 22px;
      object-fit: contain;
      flex-shrink: 0;
    }

    #message {
      margin-top: 12px;
      font-weight: 600;
      color: #134611;
    }

    .muted {
      color: #666;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .content {
        margin: 10px;
        padding: 14px;
      }

      th,
      td {
        min-width: 100px;
        font-size: 12px;
        padding: 5px 8px;
      }

      td:first-child,
      th:first-child {
        min-width: 140px;
      }

      .pick-logo {
        width: 16px;
        height: 16px;
      }

      input[type="text"],
      input[type="datetime-local"],
      select {
        width: 100%;
      }

      .team-preview-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="admin-gear" onclick="unlockAdmin()">⚙</div>

  <div class="tabs">
    <button class="tab active" id="tab-standings" type="button" onclick="switchTab('standings')">
      Standings
    </button>
    <button class="tab" id="tab-pick" type="button" onclick="switchTab('pick')">
      Make a Pick
    </button>
  </div>

  <div id="standings" class="content active">
    <h2>Standings</h2>
    <h3 id="remainingCount">Remaining Players: 0</h3>

    <div class="table-wrapper">
      <table id="standingsTable">
        <thead>
          <tr>
            <th></th>
          </tr>
          <tr>
            <th>Name</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div id="pick" class="content">
    <h2>Submit Your Pick</h2>

    <input type="text" id="playerName" placeholder="Your Name" oninput="refreshAvailableTeams()" />
    <br /><br />

    <label for="daySelect"><strong>Select Day:</strong></label><br />
    <select id="daySelect" onchange="refreshAvailableTeams()"></select>
    <br /><br />

    <label for="teamSelect"><strong>Select Team:</strong></label><br />
    <div class="team-select-row">
      <select id="teamSelect" onchange="updateSelectedTeamLogo()"></select>
      <div id="selectedTeamLogoWrap" class="selected-team-logo-wrap">
        <img id="selectedTeamLogo" class="selected-team-logo" src="" alt="" style="display:none;" />
      </div>
    </div>

    <div id="teamPreviewList" class="team-preview-list"></div>
    <br />

    <button class="action-button" onclick="submitPick()">Submit Pick</button>

    <p id="message"></p>

    <div class="admin" id="adminPanel" style="display:none;">
      <h3>Admin Controls</h3>

      <label>
        <input type="checkbox" id="lockToggle" onchange="toggleLock()" />
        Global Lock Picks
      </label>

      <br /><br />

      <label>Set Global Lock Time:</label><br />
      <input type="datetime-local" id="lockTimeInput" />
      <button class="action-button" onclick="setLockTime()">Update Global Lock Time</button>

      <br /><br />

      <label>Set Current Day:</label><br />
      <input type="text" id="currentDayInput" placeholder="Day1" />
      <button class="action-button" onclick="setCurrentDay()">Update Day</button>

      <br /><br />

      <button class="action-button" onclick="eliminateTeam()">Eliminate Team</button>

      <br /><br />

      <label>Next Day:</label><br />
      <input type="text" id="nextDayInput" placeholder="Day2" />
      <button class="action-button" onclick="advanceDay()">Advance</button>

      <p class="muted">
        Team document IDs should match the team names exactly.
      </p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      doc,
      setDoc,
      getDoc,
      updateDoc,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAItF0tjggt3yRvuEPKaCo2cDGIx76-eaM",
      authDomain: "ncaa-tournament-survivor-pool.firebaseapp.com",
      projectId: "ncaa-tournament-survivor-pool",
      storageBucket: "ncaa-tournament-survivor-pool.firebasestorage.app",
      messagingSenderId: "870538967309",
      appId: "1:870538967309:web:89d2c0f88ea239eec19844"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let cachedTeamsMap = {};
    let cachedDays = [];
    let cachedPlayers = [];

    window.switchTab = function(tab) {
      document.querySelectorAll(".content").forEach(c => c.classList.remove("active"));
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));

      document.getElementById(tab).classList.add("active");
      document.getElementById("tab-" + tab).classList.add("active");
    };

    window.unlockAdmin = function() {
      const key = prompt("Enter admin key:");
      if (key === "MM2026") {
        document.getElementById("adminPanel").style.display = "block";
        alert("Admin unlocked.");
      } else {
        alert("Incorrect key.");
      }
    };

    function renderPickCell(teamName, teamsMap) {
      const logo = teamsMap[teamName]?.logo;

      if (logo) {
        return `
          <div class="pick-cell">
            <img src="${logo}" alt="${teamName}" class="pick-logo">
            <span>${teamName}</span>
          </div>
        `;
      }

      return `
        <div class="pick-cell">
          <span>${teamName}</span>
        </div>
      `;
    }

    function isDayRevealed(day) {
      if (!day?.lockTime) return false;

      const now = new Date();
      const revealTime =
        typeof day.lockTime.toDate === "function"
          ? day.lockTime.toDate()
          : new Date(day.lockTime);

      return now >= revealTime;
    }

    function formatCutoff(day) {
      if (!day?.lockTime) return day.cutoff || "";

      try {
        const dt =
          typeof day.lockTime.toDate === "function"
            ? day.lockTime.toDate()
            : new Date(day.lockTime);

        return dt.toLocaleString();
      } catch {
        return day.cutoff || "";
      }
    }

    async function loadTeamsMap() {
      const snapshot = await getDocs(collection(db, "teams"));
      const map = {};

      snapshot.forEach(docSnap => {
        map[docSnap.id] = docSnap.data();
      });

      cachedTeamsMap = map;
      return map;
    }

    async function getAllAvailableTeams() {
      const snapshot = await getDocs(collection(db, "teams"));
      let teams = [];

      snapshot.forEach(docSnap => {
        const teamData = docSnap.data();
        const teamName = docSnap.id;

        if (!teamData.eliminated) {
          teams.push(teamName);
        }
      });

      teams.sort();
      return teams;
    }

    window.updateSelectedTeamLogo = function() {
      const selectedTeam = document.getElementById("teamSelect").value;
      const img = document.getElementById("selectedTeamLogo");

      if (!selectedTeam || !cachedTeamsMap[selectedTeam]?.logo) {
        img.style.display = "none";
        img.src = "";
        img.alt = "";
        return;
      }

      img.src = cachedTeamsMap[selectedTeam].logo;
      img.alt = selectedTeam;
      img.style.display = "block";
    };

    function renderTeamPreviewList(teamNames) {
      const teamPreviewList = document.getElementById("teamPreviewList");
      teamPreviewList.innerHTML = "";

      teamNames.forEach(team => {
        const logo = cachedTeamsMap[team]?.logo || "";
        const item = document.createElement("div");
        item.className = "team-preview-item";

        item.innerHTML = logo
          ? `<img src="${logo}" alt="${team}"><span>${team}</span>`
          : `<span>${team}</span>`;

        teamPreviewList.appendChild(item);
      });
    }

    window.refreshAvailableTeams = async function() {
      const select = document.getElementById("teamSelect");
      const name = document.getElementById("playerName").value.trim();
      const selectedDay = document.getElementById("daySelect").value;

      select.innerHTML = `<option value="">-- Select a Team --</option>`;

      await loadTeamsMap();
      const allTeams = await getAllAvailableTeams();

      if (!name || !selectedDay) {
        allTeams.forEach(team => {
          select.innerHTML += `<option value="${team}">${team}</option>`;
        });

        renderTeamPreviewList(allTeams);
        updateSelectedTeamLogo();
        return;
      }

      const playerRef = doc(db, "players", name);
      const playerSnap = await getDoc(playerRef);

      let picks = {};
      let currentDayPick = "";

      if (playerSnap.exists()) {
        const data = playerSnap.data();
        picks = data.picks || {};
        currentDayPick = picks[selectedDay] || "";
      }

      const usedTeamsOnOtherDays = Object.entries(picks)
        .filter(([dayKey]) => dayKey !== selectedDay)
        .map(([, pickedTeam]) => pickedTeam);

      const filteredTeams = allTeams.filter(team => {
        return !usedTeamsOnOtherDays.includes(team);
      });

      filteredTeams.forEach(team => {
        const isSelected = team === currentDayPick ? "selected" : "";
        select.innerHTML += `<option value="${team}" ${isSelected}>${team}</option>`;
      });

      renderTeamPreviewList(filteredTeams);
      updateSelectedTeamLogo();
    };

    async function loadDays() {
      const snapshot = await getDocs(collection(db, "days"));
      const select = document.getElementById("daySelect");
      select.innerHTML = `<option value="">-- Select a Day --</option>`;

      let days = [];

      snapshot.forEach(docSnap => {
        days.push({
          id: docSnap.id,
          ...docSnap.data()
        });
      });

      days.sort((a, b) => a.order - b.order);
      cachedDays = days;

      days.forEach(day => {
        select.innerHTML += `<option value="${day.id}">${day.label || day.id}</option>`;
      });

      refreshAvailableTeams();
    }

    async function autoEliminateMissingPicks(days, playerDocs) {
      const now = new Date();

      for (const playerDoc of playerDocs) {
        const data = playerDoc.data();
        const playerId = playerDoc.id;
        const picks = data.picks || {};
        const currentStatus = data.status || "alive";

        if (currentStatus !== "alive") continue;

        let shouldEliminate = false;

        for (const day of days) {
          if (!day.lockTime) continue;

          const dayLockTime =
            typeof day.lockTime.toDate === "function"
              ? day.lockTime.toDate()
              : new Date(day.lockTime);

          const dayHasLocked = now >= dayLockTime;
          const playerHasPick = !!picks[day.id];

          if (dayHasLocked && !playerHasPick) {
            shouldEliminate = true;
            break;
          }
        }

        if (shouldEliminate) {
          await updateDoc(doc(db, "players", playerId), {
            status: "eliminated"
          });
        }
      }
    }

    async function renderStandings() {
      const tbody = document.querySelector("#standingsTable tbody");
      const thead = document.querySelector("#standingsTable thead");

      const days = [...cachedDays].sort((a, b) => a.order - b.order);
      const playerDocs = cachedPlayers;

      if (!days.length) {
        thead.innerHTML = `
          <tr><th></th></tr>
          <tr><th>Name</th></tr>
        `;
        tbody.innerHTML = "";
        document.getElementById("remainingCount").innerText = "Remaining Players: 0";
        return;
      }

      await autoEliminateMissingPicks(days, playerDocs);

      thead.innerHTML = `
        <tr>
          <th></th>
          ${days.map(day => `<th>${formatCutoff(day)}</th>`).join("")}
        </tr>
        <tr>
          <th>Name</th>
          ${days.map(day => `<th>${day.label || day.id}</th>`).join("")}
        </tr>
      `;

      tbody.innerHTML = "";

      let aliveCount = 0;

      playerDocs.forEach(playerDoc => {
        const data = playerDoc.data();
        const picks = data.picks || {};
        const playerStatus = data.status || "alive";

        if (playerStatus === "alive") aliveCount++;

        let eliminatedReached = false;
        let row = `<tr>`;
        row += `<td>${data.name || playerDoc.id}</td>`;

        for (const day of days) {
          const pick = picks[day.id] || "";
          const winningTeams = day.winningTeams || [];
          const losingTeams = day.losingTeams || [];
          const revealed = isDayRevealed(day);

          let cellClass = "";
          let cellContent = "";

          if (eliminatedReached) {
            cellClass = "eliminatedCell";
            cellContent = "Eliminated";
          } else if (!revealed) {
            if (pick) {
              cellClass = "hiddenPickCell";
              cellContent = "Pick Submitted";
            } else {
              cellClass = "hiddenPickCell";
              cellContent = "No Pick";
            }
          } else if (!pick) {
            cellClass = "lossCell";
            cellContent = "No Pick";
            eliminatedReached = true;
          } else if (losingTeams.includes(pick)) {
            cellClass = "lossCell";
            cellContent = renderPickCell(pick, cachedTeamsMap);
            eliminatedReached = true;
          } else if (winningTeams.includes(pick)) {
            cellClass = "winCell";
            cellContent = renderPickCell(pick, cachedTeamsMap);
          } else {
            cellContent = renderPickCell(pick, cachedTeamsMap);
          }

          row += `<td class="${cellClass}">${cellContent}</td>`;
        }

        row += `</tr>`;
        tbody.innerHTML += row;
      });

      document.getElementById("remainingCount").innerText =
        "Remaining Players: " + aliveCount;
    }

    window.submitPick = async function() {
      const name = document.getElementById("playerName").value.trim();
      const selectedDay = document.getElementById("daySelect").value;
      const team = document.getElementById("teamSelect").value;
      const message = document.getElementById("message");

      if (!name) {
        message.innerText = "Enter your name.";
        return;
      }

      if (!selectedDay) {
        message.innerText = "Select a day.";
        return;
      }

      if (!team) {
        message.innerText = "Select a team.";
        return;
      }

      const settingsSnap = await getDoc(doc(db, "settings", "global"));
      const settings = settingsSnap.exists() ? settingsSnap.data() : {};

      if (settings?.picksLocked) {
        message.innerText = "Picks are locked.";
        return;
      }

      if (settings?.lockTime) {
        const now = new Date();
        const globalLockTime = settings.lockTime.toDate();

        if (now >= globalLockTime) {
          message.innerText = "Picks are locked.";
          return;
        }
      }

      const dayRef = doc(db, "days", selectedDay);
      const daySnap = await getDoc(dayRef);

      if (!daySnap.exists()) {
        message.innerText = "That day is not configured.";
        return;
      }

      const dayData = daySnap.data();

      if (dayData?.lockTime) {
        const now = new Date();
        const dayLockTime = dayData.lockTime.toDate();

        if (now >= dayLockTime) {
          message.innerText = "Picks are locked for that day.";
          return;
        }
      }

      const playerRef = doc(db, "players", name);
      const playerSnap = await getDoc(playerRef);

      let picks = {};
      let status = "alive";

      if (playerSnap.exists()) {
        const data = playerSnap.data();
        picks = data.picks || {};
        status = data.status || "alive";

        if (status === "eliminated") {
          message.innerText = "You have been eliminated.";
          return;
        }
      }

      const usedTeamsOnOtherDays = Object.entries(picks)
        .filter(([dayKey]) => dayKey !== selectedDay)
        .map(([, pickedTeam]) => pickedTeam);

      if (usedTeamsOnOtherDays.includes(team)) {
        message.innerText = "You already used that team on a prior day.";
        return;
      }

      picks[selectedDay] = team;

      await setDoc(
        playerRef,
        {
          name: name,
          status: status,
          picks: picks
        },
        { merge: true }
      );

      message.innerText = "Pick Submitted - Good Luck!";
      refreshAvailableTeams();
    };

    window.toggleLock = async function() {
      const lock = document.getElementById("lockToggle").checked;

      await setDoc(
        doc(db, "settings", "global"),
        { picksLocked: lock },
        { merge: true }
      );

      alert("Global lock updated.");
    };

    window.setLockTime = async function() {
      const input = document.getElementById("lockTimeInput").value;

      if (!input) {
        alert("Enter a global lock time.");
        return;
      }

      const date = new Date(input);

      await setDoc(
        doc(db, "settings", "global"),
        { lockTime: date },
        { merge: true }
      );

      alert("Global lock time updated.");
    };

    window.setCurrentDay = async function() {
      const day = document.getElementById("currentDayInput").value.trim();

      if (!day) {
        alert("Enter a day name.");
        return;
      }

      await setDoc(
        doc(db, "settings", "global"),
        { currentDay: day },
        { merge: true }
      );

      alert("Current day updated to " + day);
    };

    window.eliminateTeam = async function() {
      const team = prompt("Enter team to eliminate:");
      if (!team) return;

      const settingsSnap = await getDoc(doc(db, "settings", "global"));
      const settings = settingsSnap.exists() ? settingsSnap.data() : {};
      const currentDay = settings?.currentDay;

      if (!currentDay) {
        alert("Current day not set.");
        return;
      }

      await updateDoc(doc(db, "teams", team), {
        eliminated: true
      });

      const playersSnap = await getDocs(collection(db, "players"));

      for (const docSnap of playersSnap.docs) {
        const data = docSnap.data();
        const picks = data.picks || {};

        if (picks[currentDay] === team && data.status === "alive") {
          await updateDoc(doc(db, "players", docSnap.id), {
            status: "eliminated"
          });
        }
      }

      alert(team + " eliminated. Standings updated.");
      refreshAvailableTeams();
    };

    window.advanceDay = async function() {
      const nextDay = document.getElementById("nextDayInput").value.trim();

      if (!nextDay) {
        alert("Enter next day name.");
        return;
      }

      await setDoc(
        doc(db, "settings", "global"),
        {
          currentDay: nextDay,
          picksLocked: false,
          lockTime: null
        },
        { merge: true }
      );

      alert("Advanced to " + nextDay);
    };

    function subscribeToData() {
      onSnapshot(collection(db, "players"), async (snapshot) => {
        cachedPlayers = snapshot.docs;
        await renderStandings();
      });

      onSnapshot(collection(db, "days"), async (snapshot) => {
        let days = [];

        snapshot.forEach(docSnap => {
          days.push({
            id: docSnap.id,
            ...docSnap.data()
          });
        });

        days.sort((a, b) => a.order - b.order);
        cachedDays = days;

        const select = document.getElementById("daySelect");
        const currentValue = select.value;

        select.innerHTML = `<option value="">-- Select a Day --</option>`;
        days.forEach(day => {
          select.innerHTML += `<option value="${day.id}">${day.label || day.id}</option>`;
        });

        if (days.some(day => day.id === currentValue)) {
          select.value = currentValue;
        }

        await refreshAvailableTeams();
        await renderStandings();
      });

      onSnapshot(collection(db, "teams"), async (snapshot) => {
        const map = {};

        snapshot.forEach(docSnap => {
          map[docSnap.id] = docSnap.data();
        });

        cachedTeamsMap = map;
        await refreshAvailableTeams();
        await renderStandings();
      });
    }

    loadDays();
    loadTeamsMap();
    subscribeToData();
    refreshAvailableTeams();

    setInterval(async () => {
      await renderStandings();
    }, 30000);
  </script>
</body>
</html>
