<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survivor Admin</title>
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f4f6f8;
      color: #222;
    }

    h1 {
      margin-top: 0;
      color: #134611;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      max-width: 900px;
    }

    .day-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .day-card {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 14px;
      background: #fafafa;
    }

    .day-title {
      font-weight: 700;
      margin-bottom: 8px;
      color: #134611;
    }

    .day-meta {
      font-size: 14px;
      color: #555;
      margin-bottom: 10px;
    }

    .lock-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status {
      font-size: 13px;
      margin-top: 8px;
      color: #666;
    }

    button {
      margin-top: 18px;
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      background: #134611;
      color: white;
      cursor: pointer;
      font: inherit;
    }

    button:hover {
      background: #0f3810;
    }

    .message {
      margin-top: 14px;
      font-weight: 600;
      color: #134611;
    }
  </style>
</head>
<body>
  <h1>Survivor Pool Admin</h1>
<div class="card">
  <button id="loginButton" type="button">Sign in with Google</button>
  <button id="logoutButton" type="button" style="display:none;">Sign out</button>
  <p id="authStatus" class="message"></p>
</div>
  <div class="card">
    <p>Use this page to manually lock or unlock picks for each day.</p>
    <div id="dayGrid" class="day-grid"></div>
    <p id="message" class="message"></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    const firebaseConfig = {
      apiKey: "AIzaSyAItF0tjggt3yRvuEPKaCo2cDGIx76-eaM",
      authDomain: "ncaa-tournament-survivor-pool.firebaseapp.com",
      projectId: "ncaa-tournament-survivor-pool",
      storageBucket: "ncaa-tournament-survivor-pool.firebasestorage.app",
      messagingSenderId: "870538967309",
      appId: "1:870538967309:web:89d2c0f88ea239eec19844"
    };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const provider = new GoogleAuthProvider();

// IMPORTANT: replace this with your own Google email
const ADMIN_EMAIL = "davidcmcquillen@gmail.com";

const loginButton = document.getElementById("loginButton");
const logoutButton = document.getElementById("logoutButton");
const authStatus = document.getElementById("authStatus");
const dayGrid = document.getElementById("dayGrid");

loginButton.addEventListener("click", async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch (error) {
    console.error(error);
    authStatus.innerText = "Login failed.";
  }
});

logoutButton.addEventListener("click", async () => {
  try {
    await signOut(auth);
  } catch (error) {
    console.error(error);
    authStatus.innerText = "Logout failed.";
  }
});

onAuthStateChanged(auth, async (user) => {
  dayGrid.innerHTML = "";

  if (!user) {
    loginButton.style.display = "inline-block";
    logoutButton.style.display = "none";
    authStatus.innerText = "Not signed in.";
    return;
  }

  if (user.email !== ADMIN_EMAIL) {
    loginButton.style.display = "none";
    logoutButton.style.display = "inline-block";
    authStatus.innerText = "Signed in, but not authorized as admin.";
    return;
  }

  loginButton.style.display = "none";
  logoutButton.style.display = "inline-block";
  authStatus.innerText = `Signed in as ${user.email}`;
  await loadDays();
});
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    function formatCutoff(day) {
      if (!day?.lockTime) return "No lock time set";

      try {
        const dt =
          typeof day.lockTime.toDate === "function"
            ? day.lockTime.toDate()
            : new Date(day.lockTime);

        return dt.toLocaleString();
      } catch {
        return "Invalid lock time";
      }
    }

    async function loadDays() {
      const snapshot = await getDocs(collection(db, "days"));
      const dayGrid = document.getElementById("dayGrid");
      dayGrid.innerHTML = "";

      let days = [];
      snapshot.forEach(docSnap => {
        days.push({
          id: docSnap.id,
          ...docSnap.data()
        });
      });

      days.sort((a, b) => a.order - b.order);

      days.forEach(day => {
        const card = document.createElement("div");
        card.className = "day-card";

        card.innerHTML = `
          <div class="day-title">${day.label || day.id}</div>
          <div class="day-meta">${formatCutoff(day)}</div>
          <div class="lock-row">
            <input type="checkbox" id="lock-${day.id}" ${day.picksLocked ? "checked" : ""}>
            <label for="lock-${day.id}">Lock picks</label>
          </div>
          <div class="status">${day.picksLocked ? "Currently locked" : "Currently unlocked"}</div>
        `;

        const checkbox = card.querySelector("input");

        checkbox.addEventListener("change", async () => {
  const user = auth.currentUser;

  if (!user || user.email !== ADMIN_EMAIL) {
    document.getElementById("message").innerText = "You are not authorized.";
    checkbox.checked = !checkbox.checked;
    return;
  }

  try {
    await setDoc(
      doc(db, "days", day.id),
      { picksLocked: checkbox.checked },
      { merge: true }
    );

    document.getElementById("message").innerText =
      `${day.label || day.id} updated successfully.`;

    loadDays();
  } catch (error) {
    console.error(error);
    document.getElementById("message").innerText =
      "Could not update that day.";
  }
});

        dayGrid.appendChild(card);
      });
    }

    loadDays();
  </script>
</body>
</html>
